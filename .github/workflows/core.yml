name: Build Go Core

on:
  push:
    branches: [main]
    paths:
      - 'weekendr/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          go get golang.org/x/mobile/bind
          gomobile init

      - name: Run tests
        run: go test -tags noassets ./weekendr/...

      - name: Build xcframework
        run: |
          gomobile bind \
            -tags noassets \
            -target ios \
            -o WeekendrCore.xcframework \
            ./weekendr/

      - name: Upload xcframework
        uses: actions/upload-artifact@v4
        with:
          name: WeekendrCore.xcframework
          path: WeekendrCore.xcframework/
          retention-days: 30